name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false  # continue other targets if one fails
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-latest
            bin: s3cli
            artifact: s3cli-macos-arm64
          - target: x86_64-pc-windows-gnu
            os: ubuntu-latest
            bin: s3cli.exe
            artifact: s3cli-windows-x64.exe
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            bin: s3cli
            artifact: s3cli-linux-x64

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - uses: goto-bus-stop/setup-zig@v2

      - run: cargo install cargo-zigbuild

      - name: Build
        run: cargo zigbuild --release --target ${{ matrix.target }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: target/${{ matrix.target }}/release/${{ matrix.bin }}

  release:
    name: Create Release
    needs: build  # run after all targets succeed
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Rename binaries
        run: |
          mkdir dist
          mv artifacts/s3cli-macos-arm64/s3cli        dist/s3cli-macos-arm64
          mv artifacts/s3cli-linux-x64/s3cli          dist/s3cli-linux-x64
          mv artifacts/s3cli-windows-x64.exe/s3cli.exe dist/s3cli-windows-x64.exe

      - name: Create GitHub Release and upload binaries
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/s3cli-macos-arm64
            dist/s3cli-linux-x64
            dist/s3cli-windows-x64.exe
